services:
  db:
    image: postgres:16-alpine
    container_name: auth-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: auth_db
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
